<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Quote Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', sans-serif;
        }

        body {
            background-color: #191919; /* Seamlessly matches Notion Dark Mode */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        /* Matches the structural footprint of your other dashboard cards */
        .quote-card {
            background-color: #222222; 
            width: 320px;
            height: 320px; /* Symmetrical square footprint */
            padding: 40px 30px;
            border-radius: 40px; 
            border: 2px solid #3a322d; 
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer; /* Hint to the user that it can be clicked */
            transition: border-color 0.2s ease, transform 0.1s ease;
        }

        .quote-card:hover {
            border-color: #d1bfa7; /* Subtle glow response on hover */
        }

        .quote-card:active {
            transform: scale(0.98); /* Tactile press response */
        }

        .quote-text {
            font-size: 18px;
            font-weight: 400;
            color: #e6dfd3; 
            line-height: 1.6;
            margin-bottom: 24px;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s ease;
        }

        .quote-author {
            font-size: 13px;
            font-weight: 400;
            color: #8c827b; 
            letter-spacing: 0.5px;
            transition: opacity 0.2s ease;
        }
    </style>
</head>
<body>

    <div class="quote-card" id="quote-wrapper">
        <div class="quote-text" id="text-target">"Loading an inspiring thought..."</div>
        <div class="quote-author" id="author-target"></div>
    </div>

    <script>
        // A curated library of high-impact, minimalist perspective shifts
        const quotesPool = [
            { text: "The difference between hell and heaven is merely a threshold in your own mind. Step across it.", author: "Simon R. Green" },
            { text: "When do you think people die? When they are forgotten.", author: "Dr. Hiriluk" },
            { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
            { text: "Consistency beats intensity every single time.", author: "Unknown" },
            { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
            { text: "Focus is a muscle, and you build it by ignoring distractions.", author: "Unknown" },
            { text: "One day, you will be exactly where you always wanted to be. Keep going.", author: "Future Self" }
        ];

        const textTarget = document.getElementById("text-target");
        const authorTarget = document.getElementById("author-target");
        const quoteWrapper = document.getElementById("quote-wrapper");

        let lastIndex = -1;

        function cycleQuote() {
            // Initiate clean fade-out transition
            textTarget.style.opacity = 0;
            authorTarget.style.opacity = 0;
            
            setTimeout(() => {
                let nextIndex;
                
                // Keep pulling random indexes until we get a fresh one (prevents immediate repeats)
                do {
                    nextIndex = Math.floor(Math.random() * quotesPool.length);
                } while (nextIndex === lastIndex && quotesPool.length > 1);
                
                lastIndex = nextIndex;
                const activeQuote = quotesPool[nextIndex];
                
                textTarget.textContent = `"${activeQuote.text}"`;
                authorTarget.textContent = activeQuote.author ? `— ${activeQuote.author}` : "";
                
                // Fade back into view smoothly
                textTarget.style.opacity = 1;
                authorTarget.style.opacity = 1;
            }, 200); // Perfectly synced with CSS transition durations
        }

        // Bind interactive click listener to shuffle quotes
        quoteWrapper.addEventListener("click", cycleQuote);

        // Render an initial quote right out of the gate on load
        cycleQuote();
    </script>

</body>
</html>
