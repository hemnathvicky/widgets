<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Quote Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', sans-serif;
        }

        body {
            background-color: #191919; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        .quote-card {
            background-color: #222222; 
            width: 320px;
            height: 320px; 
            padding: 40px 28px;
            border-radius: 40px; 
            border: 2px solid #3a322d; 
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer; 
            transition: border-color 0.2s ease, transform 0.1s ease;
        }

        .quote-card:hover {
            border-color: #d1bfa7; 
        }

        .quote-card:active {
            transform: scale(0.98); 
        }

        .quote-text {
            font-size: 20px;
            font-weight: 500;
            color: #e6dfd3; 
            line-height: 1.5;
            margin-bottom: 16px;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s ease;
        }

        .quote-author {
            font-size: 13px;
            font-weight: 500;
            color: #8c827b; 
            letter-spacing: 0.5px;
            transition: opacity 0.2s ease;
        }
    </style>
</head>
<body>

    <div class="quote-card" id="quote-wrapper">
        <div class="quote-text" id="text-target">"Loading..."</div>
        <div class="quote-author" id="author-target"></div>
    </div>

    <script>
        const quotesPool = [
           
            { text: "The difference between hell and heaven is merely a threshold in your own mind. Step across it.", author: "Simon R. Green" },
            { text: "When do you think people die? When they are forgotten.", author: "Dr. Hiriluk (One Piece)" },
            { text: "You have no enemies. No one has any enemies. There is no one who it is okay to hurt.", author: "Thors (Vinland Saga)" },
            { text: "In order to build anything lasting, you must first be willing to stand alone.", author: "Unknown" },
            { text: "You have power over your mind - not outside events. Realize this, and you will find strength.", author: "Marcus Aurelius" },
            { text: "We suffer more often in imagination than in reality.", author: "Seneca" },
            { text: "The master has failed more times than the beginner has even tried.", author: "Stephen McCranie" },
            { text: "To live is to suffer, to survive is to find some meaning in the suffering.", author: "Friedrich Nietzsche" },
            { text: "Consistency beats intensity every single time.", author: "Unknown" },
            { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
            { text: "Focus is a muscle, and you build it by ignoring distractions.", author: "Unknown" },
            { text: "One day, you will be exactly where you always wanted to be. Keep going.", author: "Future Self" },
            { text: "Amateurs sit and wait for inspiration, the rest of us just get up and go to work.", author: "Stephen King" },
            { text: "If you are working on something that you really care about, you don't have to be pushed.", author: "Steve Jobs" },
            { text: "Do not pray for an easy life, pray for the strength to endure a difficult one.", author: "Bruce Lee" },
            { text: "You don't need more time, you just need more focus.", author: "Unknown" },
            { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb" },
            { text: "If you look at what you have in life, you'll always have more.", author: "Oprah Winfrey" },
            { text: "The fool wonders, the wise man asks.", author: "Benjamin Disraeli" },
            { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
            { text: "Be silent and consume your own smoke.", author: "Thomas Carlyle" },
            { text: "He who has a why to live can bear almost any how.", author: "Friedrich Nietzsche" },
            { text: "The temptation to quit will be greatest just before you are about to succeed.", author: "Chinese Proverb" },
            { text: "You cannot change your destination overnight, but you can change your direction.", author: "Jim Rohn" },
            { text: "Simplicity is the ultimate sophistication.", author: "Leonardo da Vinci" },
            { text: "If you don't like your destiny, don't accept it. Instead, have the courage to change it.", author: "Naruto Uzumaki" },
            { text: "Whatever you lose, you'll find it again. But what you throw away you'll never get back.", author: "Kenshin Himura" },
            { text: "Fear is not evil. It tells you what your weakness is. Once you know it, you become stronger.", author: "Gildarts (Fairy Tail)" },
            { text: "Even if things are painful and tough, people should appreciate what it means to be alive.", author: "Yato (Noragami)" },
            { text: "If you don't take risks, you can't create a future.", author: "Monkey D. Luffy" },
            { text: "Push through the pain, giving up hurts more.", author: "Vegeta (Dragon Ball)" },
            { text: "Being weak is nothing to be ashamed of... Staying weak is.", author: "Fuegoleon (Black Clover)" },
            { text: "If you can't find a reason to fight, then you shouldn't be fighting.", author: "Akame (Akame ga Kill)" },
            { text: "The secret of getting ahead is getting started.", author: "Mark Twain" },
            { text: "Great things are done by a series of small things brought together.", author: "Vincent Van Gogh" },
            { text: "It always seems impossible until it's done.", author: "Nelson Mandela" },
            { text: "Your focus determines your reality.", author: "Qui-Gon Jinn" },
            { text: "Action is the foundational key to all success.", author: "Pablo Picasso" },
            { text: "You miss 100% of the shots you don't take.", author: "Wayne Gretzky" },
            { text: "Don't count the days, make the days count.", author: "Muhammad Ali" },
            { text: "Small daily improvements over time lead to stunning results.", author: "Robin Sharma" },
            { text: "The index of your energy defines the scale of your output.", author: "Unknown" },
            { text: "Stop talking about what you are going to do, and just show the results.", author: "Unknown" },
            { text: "Disciplined execution outperforms raw talent every single day.", author: "Unknown" }
        ];

        const textTarget = document.getElementById("text-target");
        const authorTarget = document.getElementById("author-target");
        const quoteWrapper = document.getElementById("quote-wrapper");

        let lastIndex = -1;

        function cycleQuote() {
            textTarget.style.opacity = 0;
            authorTarget.style.opacity = 0;
            
            setTimeout(() => {
                let nextIndex;
                do {
                    nextIndex = Math.floor(Math.random() * quotesPool.length);
                } while (nextIndex === lastIndex && quotesPool.length > 1);
                
                lastIndex = nextIndex;
                const activeQuote = quotesPool[nextIndex];
                
                textTarget.textContent = `"${activeQuote.text}"`;
                authorTarget.textContent = activeQuote.author ? `— ${activeQuote.author}` : "";
                
                // Slight font resizing logic for exceptionally long sentences so they never clip
                if (activeQuote.text.length > 85) {
                    textTarget.style.fontSize = "17px";
                } else if (activeQuote.text.length > 60) {
                    textTarget.style.fontSize = "19px";
                } else {
                    textTarget.style.fontSize = "21px";
                }

                textTarget.style.opacity = 1;
                authorTarget.style.opacity = 1;
            }, 200); 
        }

        quoteWrapper.addEventListener("click", cycleQuote);
        cycleQuote();
    </script>

</body>
</html>
